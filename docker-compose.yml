# Local-only backends for the vector DB comparison layer.
# `docker compose up -d` brings up both Qdrant and Postgres+pgvector --
# no cloud account or API key needed to reproduce the vector-store benchmarks.

services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"   # REST + gRPC web UI
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ingestbench
      POSTGRES_PASSWORD: ingestbench
      POSTGRES_DB: ingestbench
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

volumes:
  qdrant_data:
  pg_data:
